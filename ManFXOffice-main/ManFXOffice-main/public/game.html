<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stick Hero — MFX Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: #111118; }
body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; cursor: pointer; touch-action: none; user-select: none; -webkit-user-select: none; }
canvas { display: block; }
#score {
  position: absolute; top: 16px; right: 20px;
  font-size: 2em; font-weight: 900; color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  font-family: "Space Grotesk", "Segoe UI", sans-serif;
}
#introduction {
  width: 220px; position: absolute;
  font-weight: 700; font-size: 0.85em; text-align: center;
  transition: opacity 1.5s; color: #fff; line-height: 1.5;
  background: rgba(0,0,0,0.45); padding: 10px 14px; border-radius: 10px;
  top: 50%; left: 50%; transform: translate(-50%, -80px);
  pointer-events: none;
}
#restart {
  width: 110px; height: 110px; position: absolute;
  border-radius: 50%; color: white;
  background: linear-gradient(135deg, #e8e8ec, #c4c4d4);
  border: none; font-weight: 800; font-size: 0.95em;
  font-family: "Space Grotesk", "Segoe UI", sans-serif;
  display: none; cursor: pointer; color: #111118;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  letter-spacing: 0.05em;
}
#perfect {
  position: absolute; opacity: 0; transition: opacity 1.5s;
  font-size: 1.2em; font-weight: 900; color: #FFD700;
  text-shadow: 0 0 12px rgba(255,215,0,0.8);
  top: 40%; left: 50%; transform: translateX(-50%);
  letter-spacing: 0.1em; pointer-events: none;
}
#highscore {
  position: absolute; top: 16px; left: 20px;
  font-size: 0.75em; font-weight: 700; color: rgba(255,255,255,0.6);
  font-family: "Space Grotesk", "Segoe UI", sans-serif;
  letter-spacing: 0.05em;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="highscore">BEST: 0</div>
<div id="score">0</div>
<div id="introduction">Tahan untuk hulurkan tongkat</div>
<div id="perfect">DOUBLE SCORE!</div>
<button id="restart">MAIN LAGI</button>

<script>
Array.prototype.last = function() { return this[this.length - 1]; };
Math.sinus = function(degree) { return Math.sin((degree / 180) * Math.PI); };

let phase = "waiting";
let lastTimestamp;
let heroX, heroY, sceneOffset;
let platforms = [], sticks = [], trees = [];
let score = 0, highScore = parseInt(localStorage.getItem('mfx-stick-hs') || '0');

const canvasWidth = 375, canvasHeight = 375;
const platformHeight = 100;
const heroDistanceFromEdge = 10;
const paddingX = 100;
const perfectAreaSize = 10;
const backgroundSpeedMultiplier = 0.2;
const hill1BaseHeight = 100, hill1Amplitude = 10, hill1Stretch = 1;
const hill2BaseHeight = 70, hill2Amplitude = 20, hill2Stretch = 0.5;
const stretchingSpeed = 4, turningSpeed = 4, walkingSpeed = 4;
const transitioningSpeed = 2, fallingSpeed = 2;
const heroWidth = 17, heroHeight = 30;

const canvas = document.getElementById("game");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const ctx = canvas.getContext("2d");

const introductionElement = document.getElementById("introduction");
const perfectElement = document.getElementById("perfect");
const restartButton = document.getElementById("restart");
const scoreElement = document.getElementById("score");
const highScoreElement = document.getElementById("highscore");

highScoreElement.textContent = "BEST: " + highScore;

function resetGame() {
  phase = "waiting";
  lastTimestamp = undefined;
  sceneOffset = 0;
  score = 0;
  introductionElement.style.opacity = 1;
  perfectElement.style.opacity = 0;
  restartButton.style.display = "none";
  scoreElement.innerText = score;
  platforms = [{ x: 50, w: 50 }];
  generatePlatform(); generatePlatform(); generatePlatform(); generatePlatform();
  sticks = [{ x: platforms[0].x + platforms[0].w, length: 0, rotation: 0 }];
  trees = [];
  for (let i = 0; i < 10; i++) generateTree();
  heroX = platforms[0].x + platforms[0].w - heroDistanceFromEdge;
  heroY = 0;
  draw();
}

function generateTree() {
  const lastTree = trees[trees.length - 1];
  let furthestX = lastTree ? lastTree.x : 0;
  const x = furthestX + 30 + Math.floor(Math.random() * 120);
  const color = ["#6D8821","#8FAC34","#98B333"][Math.floor(Math.random() * 3)];
  trees.push({ x, color });
}

function generatePlatform() {
  const lastPlatform = platforms[platforms.length - 1];
  let furthestX = lastPlatform.x + lastPlatform.w;
  const x = furthestX + 40 + Math.floor(Math.random() * 160);
  const w = 20 + Math.floor(Math.random() * 80);
  platforms.push({ x, w });
}

resetGame();

window.addEventListener("keydown", e => { if (e.key === " ") { e.preventDefault(); resetGame(); } });

function startStretch() {
  if (phase === "waiting") {
    lastTimestamp = undefined;
    introductionElement.style.opacity = 0;
    phase = "stretching";
    window.requestAnimationFrame(animate);
  }
}
function endStretch() { if (phase === "stretching") phase = "turning"; }

window.addEventListener("mousedown", startStretch);
window.addEventListener("mouseup", endStretch);
window.addEventListener("touchstart", e => { e.preventDefault(); startStretch(); }, { passive: false });
window.addEventListener("touchend", e => { e.preventDefault(); endStretch(); }, { passive: false });
window.addEventListener("resize", () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; draw(); });

window.requestAnimationFrame(animate);

function animate(timestamp) {
  if (!lastTimestamp) { lastTimestamp = timestamp; window.requestAnimationFrame(animate); return; }
  switch (phase) {
    case "waiting": return;
    case "stretching":
      sticks.last().length += (timestamp - lastTimestamp) / stretchingSpeed;
      break;
    case "turning":
      sticks.last().rotation += (timestamp - lastTimestamp) / turningSpeed;
      if (sticks.last().rotation > 90) {
        sticks.last().rotation = 90;
        const [nextPlatform, perfectHit] = thePlatformTheStickHits();
        if (nextPlatform) {
          score += perfectHit ? 2 : 1;
          scoreElement.innerText = score;
          if (score > highScore) { highScore = score; localStorage.setItem('mfx-stick-hs', highScore); highScoreElement.textContent = "BEST: " + highScore; }
          if (perfectHit) { perfectElement.style.opacity = 1; setTimeout(() => perfectElement.style.opacity = 0, 1000); }
          generatePlatform(); generateTree(); generateTree();
        }
        phase = "walking";
      }
      break;
    case "walking":
      heroX += (timestamp - lastTimestamp) / walkingSpeed;
      const [nextPlatform] = thePlatformTheStickHits();
      if (nextPlatform) {
        const maxHeroX = nextPlatform.x + nextPlatform.w - heroDistanceFromEdge;
        if (heroX > maxHeroX) { heroX = maxHeroX; phase = "transitioning"; }
      } else {
        const maxHeroX = sticks.last().x + sticks.last().length + heroWidth;
        if (heroX > maxHeroX) { heroX = maxHeroX; phase = "falling"; }
      }
      break;
    case "transitioning":
      sceneOffset += (timestamp - lastTimestamp) / transitioningSpeed;
      const [np] = thePlatformTheStickHits();
      if (sceneOffset > np.x + np.w - paddingX) {
        sticks.push({ x: np.x + np.w, length: 0, rotation: 0 });
        phase = "waiting";
      }
      break;
    case "falling":
      if (sticks.last().rotation < 180) sticks.last().rotation += (timestamp - lastTimestamp) / turningSpeed;
      heroY += (timestamp - lastTimestamp) / fallingSpeed;
      const maxHeroY = platformHeight + 100 + (window.innerHeight - canvasHeight) / 2;
      if (heroY > maxHeroY) { restartButton.style.display = "block"; return; }
      break;
    default: throw Error("Wrong phase");
  }
  draw();
  window.requestAnimationFrame(animate);
  lastTimestamp = timestamp;
}

function thePlatformTheStickHits() {
  if (sticks.last().rotation !== 90) throw Error(`Stick is ${sticks.last().rotation}°`);
  const stickFarX = sticks.last().x + sticks.last().length;
  const platform = platforms.find(p => p.x < stickFarX && stickFarX < p.x + p.w);
  if (platform && platform.x + platform.w / 2 - perfectAreaSize / 2 < stickFarX && stickFarX < platform.x + platform.w / 2 + perfectAreaSize / 2) return [platform, true];
  return [platform, false];
}

function draw() {
  ctx.save();
  ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  drawBackground();
  ctx.translate((window.innerWidth - canvasWidth) / 2 - sceneOffset, (window.innerHeight - canvasHeight) / 2);
  drawPlatforms(); drawHero(); drawSticks();
  ctx.restore();
}

restartButton.addEventListener("click", e => { e.preventDefault(); resetGame(); });

function drawPlatforms() {
  platforms.forEach(({ x, w }) => {
    ctx.fillStyle = "#1e1e2e";
    ctx.fillRect(x, canvasHeight - platformHeight, w, platformHeight + (window.innerHeight - canvasHeight) / 2);
    if (sticks.last().x < x) {
      ctx.fillStyle = "#e8e8ec";
      ctx.fillRect(x + w / 2 - perfectAreaSize / 2, canvasHeight - platformHeight, perfectAreaSize, perfectAreaSize);
    }
  });
}

function drawHero() {
  ctx.save();
  ctx.fillStyle = "#e8e8ec";
  ctx.translate(heroX - heroWidth / 2, heroY + canvasHeight - platformHeight - heroHeight / 2);
  drawRoundedRect(-heroWidth / 2, -heroHeight / 2, heroWidth, heroHeight - 4, 5);
  const legDistance = 5;
  ctx.beginPath(); ctx.arc(legDistance, 11.5, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(-legDistance, 11.5, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.fillStyle = "#111118"; ctx.arc(5, -7, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#c4c4d4";
  ctx.fillRect(-heroWidth / 2 - 1, -12, heroWidth + 2, 4.5);
  ctx.beginPath(); ctx.moveTo(-9, -14.5); ctx.lineTo(-17, -18.5); ctx.lineTo(-14, -8.5); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-10, -10.5); ctx.lineTo(-15, -3.5); ctx.lineTo(-5, -7); ctx.fill();
  ctx.restore();
}

function drawRoundedRect(x, y, width, height, radius) {
  ctx.beginPath();
  ctx.moveTo(x, y + radius);
  ctx.lineTo(x, y + height - radius);
  ctx.arcTo(x, y + height, x + radius, y + height, radius);
  ctx.lineTo(x + width - radius, y + height);
  ctx.arcTo(x + width, y + height, x + width, y + height - radius, radius);
  ctx.lineTo(x + width, y + radius);
  ctx.arcTo(x + width, y, x + width - radius, y, radius);
  ctx.lineTo(x + radius, y);
  ctx.arcTo(x, y, x, y + radius, radius);
  ctx.fill();
}

function drawSticks() {
  sticks.forEach(stick => {
    ctx.save();
    ctx.translate(stick.x, canvasHeight - platformHeight);
    ctx.rotate((Math.PI / 180) * stick.rotation);
    ctx.beginPath(); ctx.strokeStyle = "#e8e8ec"; ctx.lineWidth = 2;
    ctx.moveTo(0, 0); ctx.lineTo(0, -stick.length); ctx.stroke();
    ctx.restore();
  });
}

function drawBackground() {
  const gradient = ctx.createLinearGradient(0, 0, 0, window.innerHeight);
  gradient.addColorStop(0, "#1a2a1a");
  gradient.addColorStop(1, "#0d1a0d");
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
  drawHill(hill1BaseHeight, hill1Amplitude, hill1Stretch, "#2d4a1e");
  drawHill(hill2BaseHeight, hill2Amplitude, hill2Stretch, "#1e3412");
  trees.forEach(tree => drawTree(tree.x, tree.color));
}

function drawHill(baseHeight, amplitude, stretch, color) {
  ctx.beginPath();
  ctx.moveTo(0, window.innerHeight);
  ctx.lineTo(0, getHillY(0, baseHeight, amplitude, stretch));
  for (let i = 0; i < window.innerWidth; i++) ctx.lineTo(i, getHillY(i, baseHeight, amplitude, stretch));
  ctx.lineTo(window.innerWidth, window.innerHeight);
  ctx.fillStyle = color; ctx.fill();
}

function drawTree(x, color) {
  ctx.save();
  ctx.translate((-sceneOffset * backgroundSpeedMultiplier + x) * hill1Stretch, getTreeY(x, hill1BaseHeight, hill1Amplitude));
  ctx.fillStyle = "#5a4a2a";
  ctx.fillRect(-1, -5, 2, 5);
  ctx.beginPath(); ctx.moveTo(-5, -5); ctx.lineTo(0, -30); ctx.lineTo(5, -5);
  ctx.fillStyle = color; ctx.fill();
  ctx.restore();
}

function getHillY(windowX, baseHeight, amplitude, stretch) {
  const sineBaseY = window.innerHeight - baseHeight;
  return Math.sinus((sceneOffset * backgroundSpeedMultiplier + windowX) * stretch) * amplitude + sineBaseY;
}

function getTreeY(x, baseHeight, amplitude) {
  return Math.sinus(x) * amplitude + (window.innerHeight - baseHeight);
}
</script>
</body>
</html>
